name: Publish API Docker Image

on:
  push:
    branches:
      - master
    paths:
      - 'apps/truvera-api/**'
      - 'packages/mcp-shared/**'
      - 'package.json'
      - 'package-lock.json'
      - 'scripts/**'
      - '.github/workflows/docker-publish.yml'
      - '.github/workflows/docker-publish-reusable.yml'
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      push:
        description: Push image to DockerHub
        required: false
        default: true
        type: boolean
      tag:
        description: Image tag (leave blank to use sanitized branch name)
        required: false
        default: ''
        type: string

jobs:
  api:
    uses: ./.github/workflows/docker-publish-reusable.yml
    permissions:
      contents: read
      packages: write
      id-token: write
    secrets: inherit
    with:
      docker_image: docknetwork/truvera-api-mcp
      dockerfile: ./apps/truvera-api/Dockerfile
      build_number_file: apps/truvera-api/.buildnumber
      should_push: ${{ github.event_name != 'workflow_dispatch' || inputs.push }}
      tag: ${{ inputs.tag }}
