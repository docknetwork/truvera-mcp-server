name: CI

"on":
  pull_request:
  push:
    branches:
      - master

jobs:
  detect_changes:
    name: Detect Changed Areas
    runs-on: ubuntu-latest
    outputs:
      api: ${{ steps.filter.outputs.api }}
      wallet: ${{ steps.filter.outputs.wallet }}
      shared: ${{ steps.filter.outputs.shared }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Detect changed paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            api:
              - 'apps/truvera-api/**'
              - 'packages/mcp-shared/**'
              - 'package.json'
              - 'package-lock.json'
              - 'scripts/**'
              - '.github/workflows/ci.yml'
            wallet:
              - 'apps/wallet-server/**'
              - 'packages/mcp-shared/**'
              - 'package.json'
              - 'package-lock.json'
              - 'scripts/**'
              - '.github/workflows/ci.yml'
            shared:
              - 'packages/mcp-shared/**'
              - 'package.json'
              - 'package-lock.json'
              - '.github/workflows/ci.yml'

  test-shared:
    name: Build and Test mcp-shared
    runs-on: ubuntu-latest
    needs: detect_changes
    if: needs.detect_changes.outputs.shared == 'true'
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Use Node.js 22.x
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: 'npm'
          cache-dependency-path: 'package-lock.json'

      - name: Install dependencies (monorepo)
        run: npm ci --workspaces

      - name: Build shared package
        run: npm run build:shared

      - name: Run tests (mcp-shared)
        run: npm run test -- --run
        working-directory: packages/mcp-shared

  build-and-test-api:
    name: Build and Test API Server
    runs-on: ubuntu-latest
    needs: detect_changes
    if: needs.detect_changes.outputs.api == 'true'
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Use Node.js 22.x
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: 'npm'
          cache-dependency-path: 'package-lock.json'

      - name: Install dependencies (monorepo)
        run: npm ci --workspaces

      - name: Build shared package
        run: npm run build:shared

      - name: Build truvera-api
        run: npm run build:api

      - name: Run tests (truvera-api)
        run: npm run test -- --run
        working-directory: apps/truvera-api

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build truvera-api image for scanning
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./apps/truvera-api/Dockerfile
          load: true
          tags: truvera-api-mcp:ci
          build-args: |
            BUILD_NUMBER=${{ github.run_number }}

      - name: Scan truvera-api image for HIGH and CRITICAL vulnerabilities
        id: trivy_scan
        continue-on-error: true
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: truvera-api-mcp:ci
          format: table
          output: trivy-results.txt
          ignore-unfixed: true
          severity: HIGH,CRITICAL
          exit-code: '1'

      - name: Add Trivy report to job summary
        if: always()
        run: |
          {
            echo "## API Trivy Image Scan"
            echo
            if [ "${{ steps.trivy_scan.outcome }}" = "failure" ]; then
              echo "**Status:** FAILED (HIGH/CRITICAL vulnerabilities found)"
            else
              echo "**Status:** PASSED (no HIGH/CRITICAL vulnerabilities found)"
            fi
            echo
            echo "<details><summary>Full Trivy output</summary>"
            echo
            echo '```text'
            cat trivy-results.txt
            echo '```'
            echo "</details>"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Generate Trivy SARIF report
        if: always()
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: truvera-api-mcp:ci
          format: sarif
          output: trivy-results.sarif
          ignore-unfixed: true
          severity: HIGH,CRITICAL
          exit-code: '0'

      - name: Upload Trivy SARIF to GitHub Security
        id: trivy_sarif_upload
        continue-on-error: true
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-results.sarif
          category: trivy-container-scan-api

      - name: Add SARIF upload status to job summary
        if: always() && steps.trivy_sarif_upload.outcome == 'failure'
        run: |
          echo >> "$GITHUB_STEP_SUMMARY"
          echo "## API SARIF Upload" >> "$GITHUB_STEP_SUMMARY"
          echo >> "$GITHUB_STEP_SUMMARY"
          echo "SARIF upload was skipped or failed. GitHub code scanning may not be enabled for this repository." >> "$GITHUB_STEP_SUMMARY"

      - name: Fail job if Trivy found HIGH/CRITICAL issues
        if: steps.trivy_scan.outcome == 'failure'
        run: |
          echo "Trivy detected HIGH/CRITICAL vulnerabilities in API image. See job summary and Security tab for details."
          exit 1

  build-and-test-wallet:
    name: Build and Test Wallet Server
    runs-on: ubuntu-latest
    needs: detect_changes
    if: needs.detect_changes.outputs.wallet == 'true'
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Use Node.js 22.x
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: 'npm'
          cache-dependency-path: 'package-lock.json'

      - name: Install dependencies (monorepo)
        run: npm ci --workspaces

      - name: Build shared package
        run: npm run build:shared

      - name: Build wallet-server
        run: npm run build:wallet

      - name: Run tests (wallet-server unit)
        run: npm test
        working-directory: apps/wallet-server

      - name: Run tests (wallet-server integration)
        run: npm run test:integration
        working-directory: apps/wallet-server

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build wallet-server image for scanning
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./apps/wallet-server/Dockerfile
          load: true
          tags: truvera-wallet-mcp:ci
          build-args: |
            BUILD_NUMBER=${{ github.run_number }}

      - name: Scan wallet-server image for HIGH and CRITICAL vulnerabilities
        id: wallet_trivy_scan
        continue-on-error: true
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: truvera-wallet-mcp:ci
          format: table
          output: wallet-trivy-results.txt
          ignore-unfixed: true
          severity: HIGH,CRITICAL
          exit-code: '1'

      - name: Add wallet Trivy report to job summary
        if: always()
        run: |
          {
            echo "## Wallet Trivy Image Scan"
            echo
            if [ "${{ steps.wallet_trivy_scan.outcome }}" = "failure" ]; then
              echo "**Status:** FAILED (HIGH/CRITICAL vulnerabilities found)"
            else
              echo "**Status:** PASSED (no HIGH/CRITICAL vulnerabilities found)"
            fi
            echo
            echo "<details><summary>Full Trivy output</summary>"
            echo
            echo '```text'
            cat wallet-trivy-results.txt
            echo '```'
            echo "</details>"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Generate wallet Trivy SARIF report
        if: always()
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: truvera-wallet-mcp:ci
          format: sarif
          output: wallet-trivy-results.sarif
          ignore-unfixed: true
          severity: HIGH,CRITICAL
          exit-code: '0'

      - name: Upload wallet Trivy SARIF to GitHub Security
        id: wallet_trivy_sarif_upload
        continue-on-error: true
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: wallet-trivy-results.sarif
          category: trivy-container-scan-wallet

      - name: Add SARIF upload status to job summary
        if: always() && steps.wallet_trivy_sarif_upload.outcome == 'failure'
        run: |
          echo >> "$GITHUB_STEP_SUMMARY"
          echo "## Wallet SARIF Upload" >> "$GITHUB_STEP_SUMMARY"
          echo >> "$GITHUB_STEP_SUMMARY"
          echo "SARIF upload was skipped or failed. GitHub code scanning may not be enabled for this repository." >> "$GITHUB_STEP_SUMMARY"

      - name: Fail job if Trivy found HIGH/CRITICAL issues
        if: steps.wallet_trivy_scan.outcome == 'failure'
        run: |
          echo "Trivy detected HIGH/CRITICAL vulnerabilities in wallet image. See job summary and Security tab for details."
          exit 1
