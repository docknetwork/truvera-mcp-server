name: CI

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [22.x]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build (TypeScript)
        run: npm run build

      - name: Unit tests
        run: npm run test -- --run 'src/**/*.test.ts'

      - name: Integration tests
        run: npm run test -- --run 'tests/integration/**/*.test.ts'

      - name: E2E tests
        run: npm run test -- --run 'tests/e2e/**/*.test.ts' 'src/features/**/tests/e2e/**/*.test.ts'

      - name: Smoke tests
        run: npm run smoke
