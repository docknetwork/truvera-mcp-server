name: CI

on:
  push:
  pull_request:

jobs:
  build:
    name: Build and Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [22.x]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: 'apps/truvera-api/package-lock.json'

      - name: Install dependencies
        run: npm ci
        working-directory: apps/truvera-api

      - name: Build (TypeScript)
        run: npm run build
        working-directory: apps/truvera-api

      - name: Unit tests
        run: npm run test -- --run --testNamePattern "^unit:"
        working-directory: apps/truvera-api

      - name: Integration tests
        run: npm run test -- --run --testNamePattern "^integration:"
        working-directory: apps/truvera-api

      - name: E2E tests
        run: npm run test -- --run --testNamePattern "^e2e:"
        working-directory: apps/truvera-api

      - name: Smoke tests
        run: npm run smoke
        working-directory: apps/truvera-api
