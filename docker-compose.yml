version: '3.8'

services:
  truvera-mcp-service:
    build:
      context: ./apps/truvera-api
      dockerfile: Dockerfile
    container_name: truvera-mcp-service
    environment:
      - TRUVERA_API_KEY=${TRUVERA_API_KEY}
      - TRUVERA_API_ENDPOINT=${TRUVERA_API_ENDPOINT:-https://api.truvera.com}
      - MCP_MODE=${MCP_MODE:-http}
      - MCP_PORT=3000
      - NODE_ENV=production
    ports:
      - "3000:3000"
    restart: unless-stopped
    networks:
      - mcp-network

  wallet-mcp-service:
    build:
      context: .
      dockerfile: apps/wallet-server/Dockerfile
    container_name: wallet-mcp-service
    environment:
      - WALLET_MASTER_KEY=${WALLET_MASTER_KEY}
      - MCP_MODE=${MCP_MODE:-http}
      - MCP_PORT=3001
      - CHEQD_NETWORK=${CHEQD_NETWORK:-testnet}
      - WALLET_NAME=${WALLET_NAME:-mcp-wallet}
      - NODE_ENV=production
    ports:
      - "3001:3001"
    volumes:
      - wallet-db-data:/data
    restart: unless-stopped
    networks:
      - mcp-network

networks:
  mcp-network:
    driver: bridge

volumes:
  wallet-db-data:
