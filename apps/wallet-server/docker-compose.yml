version: '3.8'

services:
  wallet-mcp-service:
    build:
      context: ../..
      dockerfile: apps/wallet-server/Dockerfile
    container_name: wallet-mcp-service
    environment:
      - WALLET_MASTER_KEY=${WALLET_MASTER_KEY}
      - MCP_MODE=${MCP_MODE:-http}
      - MCP_PORT=3001
      - CHEQD_NETWORK=${CHEQD_NETWORK:-testnet}
      - WALLET_NAME=${WALLET_NAME:-mcp-wallet}
      - WALLET_DB_PATH=${WALLET_DB_PATH:-/data/wallet-db}
      - NODE_ENV=production
    ports:
      - "3001:3001"
    volumes:
      - wallet-db-data:/data
    restart: unless-stopped
    networks:
      - mcp-network

networks:
  mcp-network:
    driver: bridge

volumes:
  wallet-db-data: